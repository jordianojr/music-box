<title>Ma Toilette — Vanity Study</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#c5cfb6;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Caveat',cursive}
  .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(210,220,195,0.6) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(195,205,180,0.4) 0%,transparent 50%),#c5cfb6;z-index:0}
  .bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(180,190,165,0.12) 1px,transparent 1px);background-size:20px 20px}
  .wrap{position:relative;z-index:1;width:1050px;height:780px}
  svg.main{width:100%;height:100%;overflow:visible}
  .sk{stroke-linecap:round;stroke-linejoin:round}
  .vi{cursor:pointer;transition:filter 0.25s ease}
  .vi:hover{filter:drop-shadow(0 5px 14px rgba(90,85,70,0.22)) brightness(1.04)}
  .tip{position:fixed;background:#faf6ef;color:#5a5549;font-family:'Caveat',cursive;font-size:20px;padding:5px 14px;border-radius:10px;border:1.8px solid #d4cabb;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:999;box-shadow:0 3px 12px rgba(0,0,0,0.08);white-space:nowrap}
  .tip.on{opacity:1}
  .stitle{position:absolute;bottom:10px;left:22px;font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:14px;letter-spacing:3px;color:rgba(90,85,73,0.35);text-transform:uppercase}
  @keyframes spark{0%{opacity:0;transform:scale(0) rotate(0)}40%{opacity:1;transform:scale(1.3) rotate(20deg)}100%{opacity:0;transform:scale(0) rotate(50deg)}}
  .spark{position:fixed;width:8px;height:8px;pointer-events:none;z-index:500}
  .spark::before,.spark::after{content:'';position:absolute;border-radius:1px}
  .spark::before{width:100%;height:2px;top:50%;transform:translateY(-50%);background:var(--sc,#e0cc9d)}
  .spark::after{height:100%;width:2px;left:50%;transform:translateX(-50%);background:var(--sc,#e0cc9d)}
  @keyframes petalDrift{0%{opacity:0;transform:translate(0,0) rotate(0deg)}8%{opacity:0.65}100%{opacity:0;transform:translate(35px,170px) rotate(300deg)}}
  .petal{position:fixed;width:7px;height:11px;border-radius:50% 50% 50% 0;pointer-events:none;opacity:0;z-index:2}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(35px)}100%{opacity:1;transform:translateY(0)}}
  .wrap{animation:fadeUp 1s ease-out forwards}
  .modal-overlay{position:fixed;inset:0;background:rgba(90,85,73,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal-box{background:#faf6ef;border-radius:18px;border:2px solid #d4cabb;box-shadow:0 12px 48px rgba(0,0,0,0.18);padding:32px 36px;text-align:center;max-width:340px;width:90%;transform:scale(0.85) translateY(20px);transition:transform 0.3s ease;display:flex;flex-direction:column;align-items:center;gap:16px}
  .modal-overlay.open .modal-box{transform:scale(1) translateY(0)}
  .modal-box img{width:180px;height:180px;object-fit:contain;border-radius:12px;background:#efe8dc;border:1.5px solid #e0d8cc}
  .modal-box h2{font-family:'Caveat',cursive;font-size:28px;color:#5a5549;font-weight:600;margin:0}
  .modal-box p{font-family:'Cormorant Garamond',serif;font-size:16px;color:#7a7569;font-style:italic;margin:0;line-height:1.5}
  .pw-overlay{position:fixed;inset:0;background:rgba(90,85,73,0.55);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
  .pw-overlay.open{opacity:1;pointer-events:auto}
  .pw-box{background:#faf6ef;border-radius:18px;border:2px solid #d4cabb;box-shadow:0 12px 48px rgba(0,0,0,0.18);padding:36px 32px;text-align:center;max-width:320px;width:90%;transform:scale(0.85);transition:transform 0.3s ease;display:flex;flex-direction:column;align-items:center;gap:14px}
  .pw-overlay.open .pw-box{transform:scale(1)}
  .pw-box h2{font-family:'Caveat',cursive;font-size:26px;color:#5a5549;margin:0}
  .pw-box input{font-family:'Cormorant Garamond',serif;font-size:16px;padding:8px 14px;border:1.5px solid #d4cabb;border-radius:10px;outline:none;width:100%;text-align:center;background:#fff;color:#5a5549}
  .pw-box input:focus{border-color:#a09888}
  .pw-box button{font-family:'Caveat',cursive;font-size:20px;padding:8px 28px;border:1.8px solid #b0a898;border-radius:10px;background:#f0ebe2;color:#5a5549;cursor:pointer;transition:background 0.2s}
  .pw-box button:hover{background:#e8e0d4}
  .pw-box .pw-err{font-family:'Cormorant Garamond',serif;font-size:14px;color:#c05050;min-height:20px}
  .pw-box .pw-loading{font-family:'Cormorant Garamond',serif;font-size:14px;color:#8a8478;font-style:italic}
</style>
</head>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <img id="modal-img" src="" alt="">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <h2>Enter Password</h2>
    <input type="password" id="pw-input" placeholder="whisper the secret…" autocomplete="off">
    <div class="pw-err" id="pw-err"></div>
    <button id="pw-btn">Unlock</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://idtoiuwzitbgggmkvryy.supabase.co';
const EDGE_FN = `${SUPABASE_URL}/functions/v1/get-vanity`;
const DB_NAME = 'vanityDB';
const STORE_NAME = 'items';
const META_STORE = 'meta';

const tip = document.getElementById('tip');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
const pwOverlay = document.getElementById('pw-overlay');
const pwInput = document.getElementById('pw-input');
const pwBtn = document.getElementById('pw-btn');
const pwErr = document.getElementById('pw-err');

// ——— IndexedDB helpers ———
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'name' });
      }
      if (!db.objectStoreNames.contains(META_STORE)) {
        db.createObjectStore(META_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getAllItems() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveItems(items) {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  const store = tx.objectStore(STORE_NAME);
  for (const item of items) store.put(item);
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function getSong() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(META_STORE, 'readonly');
    const store = tx.objectStore(META_STORE);
    const req = store.get('song');
    req.onsuccess = () => resolve(req.result ? req.result.data : null);
    req.onerror = () => reject(req.error);
  });
}

async function saveSong(base64) {
  const db = await openDB();
  const tx = db.transaction(META_STORE, 'readwrite');
  tx.objectStore(META_STORE).put({ key: 'song', data: base64 });
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

// ——— Fetch as base64 for caching ———
async function fetchAsBase64(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

// ——— Data store (name → {description, imageData}) ———
let vanityData = {};

function populateData(items) {
  for (const item of items) {
    vanityData[item.name] = { description: item.description || '', imageData: item.imageData || null };
  }
}

// ——— Auth + fetch from edge function ———
async function authenticate(password) {
  const res = await fetch(EDGE_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed');
  return data;
}

async function loadFromEdge(password) {
  const data = await authenticate(password);
  // Download all images + song in parallel
  const [withImages, songData] = await Promise.all([
    Promise.all(data.items.map(async (item) => {
      const imageData = item.image_url ? await fetchAsBase64(item.image_url) : null;
      return { name: item.name, description: item.description, imageData };
    })),
    data.song_url ? fetchAsBase64(data.song_url) : null,
  ]);
  await saveItems(withImages);
  if (songData) await saveSong(songData);
  return { items: withImages, songData };
}

// ——— Audio player ———
let bgAudio = null;
function playSong(base64Data) {
  if (!base64Data || bgAudio) return;
  bgAudio = new Audio(base64Data);
  bgAudio.loop = true;
  bgAudio.volume = 0.7;
  bgAudio.play().catch(() => {
    // Autoplay blocked — play on first user interaction
    const resume = () => { bgAudio.play(); document.removeEventListener('click', resume); };
    document.addEventListener('click', resume);
  });
}

// ——— Init: check IndexedDB first, else prompt password ———
async function init() {
  try {
    const cached = await getAllItems();
    if (cached.length > 0) {
      populateData(cached);
      const songData = await getSong();
      playSong(songData);
      return;
    }
  } catch {}
  // Show password prompt
  pwOverlay.classList.add('open');
}

pwBtn.addEventListener('click', handleUnlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });

async function handleUnlock() {
  const pw = pwInput.value.trim();
  if (!pw) { pwErr.textContent = 'Please enter the password'; return; }
  pwErr.textContent = '';
  pwBtn.disabled = true;
  pwBtn.textContent = 'Loading…';
  try {
    const { items, songData } = await loadFromEdge(pw);
    populateData(items);
    pwOverlay.classList.remove('open');
    playSong(songData);
  } catch (e) {
    pwErr.textContent = e.message === 'Incorrect password' ? 'Wrong password, try again' : 'Something went wrong';
  } finally {
    pwBtn.disabled = false;
    pwBtn.textContent = 'Unlock';
  }
}

// ——— Item click → modal ———
document.querySelectorAll('.vi').forEach(el => {
  const n = el.dataset.name;
  el.addEventListener('mouseenter', e => { tip.textContent = n; tip.classList.add('on'); sparks(e.clientX, e.clientY, 3); });
  el.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 16) + 'px'; tip.style.top = (e.clientY - 32) + 'px'; });
  el.addEventListener('mouseleave', () => tip.classList.remove('on'));
  el.addEventListener('click', e => {
    burst(e.clientX, e.clientY);
    const item = vanityData[n];
    if (!item || !item.imageData) {
      // Not yet loaded — prompt password
      if (!pwOverlay.classList.contains('open')) pwOverlay.classList.add('open');
      return;
    }
    modalImg.src = item.imageData;
    modalImg.alt = n;
    modalTitle.textContent = n;
    modalDesc.textContent = item.description || '';
    modal.classList.add('open');
  });
});

modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

// ——— Effects ———
function sparks(x,y,n){for(let i=0;i<n;i++){const s=document.createElement('div');s.className='spark';s.style.left=(x+(Math.random()-.5)*28)+'px';s.style.top=(y+(Math.random()-.5)*28)+'px';s.style.animation=`spark ${.35+Math.random()*.3}s ease-out forwards`;s.style.setProperty('--sc',['#e0cc9d','#e8b4b8','#c5b8d4','#a8d4c0'][i%4]);document.body.appendChild(s);setTimeout(()=>s.remove(),700)}}

function burst(cx,cy){for(let i=0;i<10;i++){const s=document.createElement('div');s.className='spark';const a=(i/10)*Math.PI*2,d=16+Math.random()*22;s.style.left=(cx+Math.cos(a)*d)+'px';s.style.top=(cy+Math.sin(a)*d)+'px';s.style.animation=`spark ${.25+Math.random()*.35}s ${i*.02}s ease-out forwards`;s.style.setProperty('--sc',['#e0cc9d','#e8b4b8','#c5b8d4','#a8d4c0','#f0c8a8'][i%5]);document.body.appendChild(s);setTimeout(()=>s.remove(),800)}}

function petal(){const w=document.querySelector('.wrap'),r=w.getBoundingClientRect(),p=document.createElement('div');p.className='petal';p.style.left=(r.left+r.width*.755+Math.random()*30)+'px';p.style.top=(r.top+r.height*.42+Math.random()*15)+'px';p.style.background=Math.random()>.5?'#e8a8a8':'#f0b8a8';p.style.animation=`petalDrift ${5+Math.random()*4}s ease-in-out forwards`;document.body.appendChild(p);setTimeout(()=>p.remove(),10000)}
setInterval(petal,2800);setTimeout(petal,800);setTimeout(petal,1600);

// Start
init();
</script>
